<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO - {{ _("Diario") }}</title>

    <link rel="stylesheet" href="../static/css/diario.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="encabezado">

        <h1>{{ _("📖 Mi Diario") }}</h1>

        <a href="dashboard" class="volver">← Volver</a>

    </header>

    <main class="contenedor">

        <section class="escribir">

            <h2>{{ _("Nueva entrada") }}</h2>


            <form action="{{ url_for('guardar_entrada') }}" method="POST">

                <label for="titulo">{{ _("Título") }}</label>
                <input type="text" id="titulo" name="titulo" required>

                <label for="fecha">{{ _("Fecha") }}</label>
                <input type="date" id="fecha" name="fecha" required>

                <label for="texto">{{ _("¿Qué has hecho hoy?") }}</label>
                <textarea id="texto" name="texto" required></textarea>

                <button type="submit">
                    {{ _("💾 Guardar entrada") }}
                </button>

            </form>

        </section>

        <section class="historial">

            <h2>{{ _("Mis entradas") }}</h2>

            {% if entradas %}

                {% for entrada in entradas %}

                    <div class="entrada">
                        <h3>{{ entrada.date}}</h3>
                        <h4>{{ entrada.title }}</h4>
                        <p>{{ entrada.content }}</p>
                    </div>

                {% endfor %}

            {% else %}

                <p>{{ _("Aún no has escrito ninguna entrada.") }}</p>

            {% endif %}

        </section>

    </main>

</body>

</html>
