<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO - Iniciar Sesión</title>

    <link rel="stylesheet" href="../static/css/styles.css">

</head>
<body>

    <div class="container">

        <div class="logo">
            🌱
        </div>

        <h1>ECHO</h1>

        <p class="descripcion">
            Cuida de tu planta virtual mientras contribuyes a proteger el medio ambiente.
        </p>

        <form action="{{url_for('login')}}" method="POST" class="formulario">

            <div class="input-group">
                <label for="correo">Correo electrónico</label>
                <input
                    type="email"
                    name="email"
                    id="correo"
                    placeholder="ejemplo@correo.com"
                    required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder="••••••••"
                    required>
            </div>

            <button type="submit">
                Iniciar sesión
            </button>

        </form>

        <div class="links">
            <p>
                ¿No tienes cuenta?
                <a href="#">Regístrate</a>
            </p>
        </div>

        <footer>
            🌍 Cada acción hace crecer tu planta y ayuda al planeta.
        </footer>

    </div>

</body>
</html>
