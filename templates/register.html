<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO - {{ _("Registrarse") }}</title>

    <link rel="stylesheet" href="../static/css/styles.css">

</head>
<body>

    <div class="container">

        <div class="logo">
            🌱
        </div>

        <h1>ECHO</h1>

        <p class="descripcion">
            {{ _("Cuida de tu planta virtual mientras contribuyes a proteger el medio ambiente.") }}
        </p>

        <form action="{{url_for('register')}}" method="POST" class="formulario">

            <div class="input-group">
                <label for="correo">{{ _("Correo electrónico") }}</label>
                <input
                    type="email"
                    name="email"
                    id="correo"
                    placeholder="ejemplo@correo.com"
                    required>
            </div>

            <div class="input-group">
                <label for="password">{{ _("Contraseña") }}</label>
                <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder="••••••••"
                    required>
            </div>

            <div class="input-group">
                <label for="username">{{ _("Nombre de usuario") }}</label>
                <input
                    type="text"
                    name="username"
                    id="username"
                    placeholder="Nombre de usuario"
                    required>
            </div>

            <div class="input-group">
                <label for="plant_name">{{ _("Nombre de la planta") }}</label>
                <input
                    type="text"
                    name="plant_name"
                    id="plant_name"
                    placeholder="Nombre de la planta"
                    required>
            </div>

            <div class="input-group">
                <label for="plant_type">{{ _("Tipo de planta") }}</label>
                <select name="plant_type" id="plant_type" required>
                    <option value="Cactus">{{ _("Cactus") }}</option>
                    <option value="Suculenta">{{ _("Suculenta") }}</option>
                    <option value="Orquídea">{{ _("Orquídea") }}</option>
                    <option value="Roble">{{ _("Roble") }}</option>
                </select>
            </div>

            <button type="submit">
                {{ _("Registrarme") }}
            </button>

        </form>

        <div class="links">
            <p>
                {{ _("¿Ya tienes cuenta?") }}
                <a href="/login">{{ _("Inicia sesión") }}</a>
            </p>
        </div>

        <footer>
            {{ _("🌍 Cada acción hace crecer tu planta y ayuda al planeta.") }}
        </footer>

    </div>

</body>
</html>
