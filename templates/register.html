<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO - Registrarse</title>

    <link rel="stylesheet" href="../static/css/styles.css">

</head>
<body>

    <div class="container">

        <div class="logo">
            🌱
        </div>

        <h1>ECHO</h1>

        <p class="descripcion">
            Cuida de tu planta virtual mientras contribuyes a proteger el medio ambiente.
        </p>

        <form action="{{url_for('register')}}" method="POST" class="formulario">

            <div class="input-group">
                <label for="correo">Correo electrónico</label>
                <input
                    type="email"
                    name="email"
                    id="correo"
                    placeholder="ejemplo@correo.com"
                    required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder="••••••••"
                    required>
            </div>

            <div class="input-group">
                <label for="username">Nombre de usuario</label>
                <input
                    type="text"
                    name="username"
                    id="username"
                    placeholder="Nombre de usuario"
                    required>
            </div>

            <div class="input-group">
                <label for="plant_name">Nombre de la planta</label>
                <input
                    type="text"
                    name="plant_name"
                    id="plant_name"
                    placeholder="Nombre de la planta"
                    required>
            </div>

            <div class="input-group">
                <label for="plant_type">Tipo de planta</label>
                <select name="plant_type" id="plant_type" required>
                    <option value="Cactus">Cactus</option>
                    <option value="Suculenta">Suculenta</option>
                    <option value="Orquídea">Orquídea</option>
                    <option value="Roble">Roble</option>
                </select>
            </div>

            <button type="submit">
                Registrarme
            </button>

        </form>

        <div class="links">
            <p>
                ¿Ya tienes cuenta?
                <a href="/login">Inicia sesión</a>
            </p>
        </div>

        <footer>
            🌍 Cada acción hace crecer tu planta y ayuda al planeta.
        </footer>

    </div>

</body>
</html>
