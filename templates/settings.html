<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPlant - Ajustes</title>

    <link rel="stylesheet" href="../static/css/settings.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="encabezado">

        <h1>⚙️ Ajustes</h1>

        <a href="principal.html" class="volver">
            ← Volver
        </a>

    </header>

    <main class="contenedor">

        <section class="tarjeta">

            <h2>👤 Perfil</h2>

            <label>Nombre de usuario</label>
            <input type="text" value="Usuario">

            <label>Correo electrónico</label>
            <input type="email" value="usuario@correo.com">

        </section>

        <section class="tarjeta">

            <h2>🌱 Preferencias</h2>

            <div class="opcion">
                <span>🔔 Recibir notificaciones</span>
                <input type="checkbox" checked>
            </div>

            <div class="opcion">
                <span>🌙 Modo oscuro</span>
                <input type="checkbox">
            </div>

            <div class="opcion">
                <span>🌍 Mostrar consejos ecológicos</span>
                <input type="checkbox" checked>
            </div>

        </section>

        <section class="tarjeta">

            <h2>🎨 Personalización</h2>

            <label>Nombre de tu planta</label>
            <input type="text" value="Roble Verde">

            <label>Idioma</label>

            <select>
                <option>Español</option>
                <option>English</option>
                <option>Français</option>
            </select>

        </section>

        <section class="tarjeta botones">

            <button class="guardar">
                💾 Guardar cambios
            </button>

            <button class="cerrar">
                🚪 Cerrar sesión
            </button>

        </section>

    </main>

</body>

</html>
